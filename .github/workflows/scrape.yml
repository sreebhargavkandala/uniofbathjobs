name: Scrape Bath Jobs

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC — 7am BST (summer) / 6am GMT (winter)
    - cron: '0 17 * * *'  # 5pm UTC — 6pm BST (summer) / 5pm GMT (winter)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scrape on Render
        run: |
          curl -f -s --max-time 300 \
            -X POST \
            -H "X-Scrape-Token: ${{ secrets.SCRAPE_TOKEN }}" \
            "${{ secrets.RENDER_URL }}/api/scrape"
