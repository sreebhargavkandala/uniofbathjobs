name: Scrape Bath Jobs

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC — 7am BST (summer) / 6am GMT (winter)
    - cron: '0 17 * * *'  # 5pm UTC — 6pm BST (summer) / 5pm GMT (winter)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run scraper on Fly.io
        run: fly ssh console -a uniofbathjobs -C "cd /app && python scraper.py"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
